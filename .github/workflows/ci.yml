name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd packages/qgate
          pip install -e ".[dev]"
      - name: Ruff check
        run: |
          cd packages/qgate
          ruff check src/ tests/
      - name: Ruff format check
        run: |
          cd packages/qgate
          ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd packages/qgate
          pip install -e ".[dev]"
      - name: Mypy
        continue-on-error: true
        run: |
          cd packages/qgate
          mypy src/qgate/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          cd packages/qgate
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          cd packages/qgate
          pytest -v --tb=short tests/
      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          cd packages/qgate
          pytest --cov=qgate --cov-report=term-missing tests/
