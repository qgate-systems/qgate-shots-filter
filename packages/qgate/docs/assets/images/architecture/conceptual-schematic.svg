<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <!-- Gradients -->
    <linearGradient id="passGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="failGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f44336;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c62828;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neutralGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90CAF9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    
    <!-- Checkmark symbol -->
    <symbol id="checkmark" viewBox="0 0 24 24">
      <path fill="white" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
    </symbol>
    
    <!-- X symbol -->
    <symbol id="xmark" viewBox="0 0 24 24">
      <path fill="white" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
    </symbol>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="#FAFAFA"/>
  
  <!-- Title -->
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#333">
    Conditioning Strategies for Multi-Subsystem Verification
  </text>
  
  <!-- Divider line -->
  <line x1="450" y1="60" x2="450" y2="480" stroke="#E0E0E0" stroke-width="2" stroke-dasharray="8,4"/>
  
  <!-- ==================== LEFT SIDE: GLOBAL CONDITIONING ==================== -->
  
  <!-- Section Title -->
  <text x="225" y="75" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1565C0">
    (A) Global Conditioning
  </text>
  <text x="225" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">
    All subsystems evaluated jointly
  </text>
  
  <!-- Subsystems container box -->
  <rect x="50" y="115" width="350" height="160" rx="10" fill="none" stroke="#BDBDBD" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="225" y="135" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#888">N Subsystems</text>
  
  <!-- Subsystem blocks (one fails) -->
  <g filter="url(#shadow)">
    <!-- Subsystem 1 - Pass -->
    <rect x="70" y="150" width="60" height="50" rx="6" fill="url(#passGrad)"/>
    <text x="100" y="180" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">S₁</text>
    <use href="#checkmark" x="88" y="185" width="24" height="24"/>
    
    <!-- Subsystem 2 - Pass -->
    <rect x="145" y="150" width="60" height="50" rx="6" fill="url(#passGrad)"/>
    <text x="175" y="180" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">S₂</text>
    <use href="#checkmark" x="163" y="185" width="24" height="24"/>
    
    <!-- Subsystem 3 - FAIL (highlighted) -->
    <rect x="220" y="150" width="60" height="50" rx="6" fill="url(#failGrad)" stroke="#B71C1C" stroke-width="3"/>
    <text x="250" y="180" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">S₃</text>
    <use href="#xmark" x="238" y="185" width="24" height="24"/>
    
    <!-- Subsystem 4 - Pass -->
    <rect x="295" y="150" width="60" height="50" rx="6" fill="url(#passGrad)"/>
    <text x="325" y="180" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">S₄</text>
    <use href="#checkmark" x="313" y="185" width="24" height="24"/>
    
    <!-- Ellipsis -->
    <text x="375" y="180" font-family="Arial, sans-serif" font-size="20" fill="#666">…</text>
    
    <!-- Subsystem N - Pass -->
    <rect x="320" y="210" width="60" height="50" rx="6" fill="url(#passGrad)"/>
    <text x="350" y="240" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Sₙ</text>
    <use href="#checkmark" x="338" y="245" width="24" height="24"/>
  </g>
  
  <!-- Arrow pointing down to aggregator -->
  <path d="M225 280 L225 310" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <polygon points="225,320 220,310 230,310" fill="#666"/>
  
  <!-- Global aggregator (AND gate style) -->
  <g filter="url(#shadow)">
    <rect x="150" y="325" width="150" height="50" rx="8" fill="#455A64"/>
    <text x="225" y="350" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">GLOBAL TEST</text>
    <text x="225" y="365" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#B0BEC5">(Joint Evaluation)</text>
  </g>
  
  <!-- Arrow to result -->
  <path d="M225 375 L225 405" stroke="#666" stroke-width="2" fill="none"/>
  <polygon points="225,415 220,405 230,405" fill="#666"/>
  
  <!-- REJECT result -->
  <g filter="url(#shadow)">
    <rect x="150" y="420" width="150" height="45" rx="8" fill="url(#failGrad)"/>
    <text x="225" y="448" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">REJECT</text>
  </g>
  
  <!-- Annotation: Single failure causes rejection -->
  <g>
    <path d="M285 175 Q340 175 340 220 Q340 340 305 340" stroke="#D32F2F" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <polygon points="305,340 315,335 315,345" fill="#D32F2F"/>
    <text x="360" y="175" font-family="Arial, sans-serif" font-size="10" fill="#D32F2F" font-style="italic">Single failure</text>
    <text x="360" y="188" font-family="Arial, sans-serif" font-size="10" fill="#D32F2F" font-style="italic">→ total rejection</text>
  </g>
  
  <!-- ==================== RIGHT SIDE: HIERARCHICAL k-of-N ==================== -->
  
  <!-- Section Title -->
  <text x="675" y="75" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2E7D32">
    (B) Hierarchical k-of-N Conditioning
  </text>
  <text x="675" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">
    Subsystems evaluated independently, then aggregated
  </text>
  
  <!-- Subsystems container box -->
  <rect x="500" y="115" width="350" height="160" rx="10" fill="none" stroke="#BDBDBD" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="675" y="135" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#888">N Subsystems (Independent Tests)</text>
  
  <!-- Subsystem blocks with individual test results -->
  <g filter="url(#shadow)">
    <!-- Subsystem 1 - Pass -->
    <rect x="520" y="150" width="60" height="50" rx="6" fill="url(#passGrad)"/>
    <text x="550" y="180" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">S₁</text>
    <use href="#checkmark" x="538" y="185" width="24" height="24"/>
    
    <!-- Subsystem 2 - Pass -->
    <rect x="595" y="150" width="60" height="50" rx="6" fill="url(#passGrad)"/>
    <text x="625" y="180" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">S₂</text>
    <use href="#checkmark" x="613" y="185" width="24" height="24"/>
    
    <!-- Subsystem 3 - FAIL (but tolerated) -->
    <rect x="670" y="150" width="60" height="50" rx="6" fill="url(#failGrad)" stroke="#FF8A65" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="700" y="180" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">S₃</text>
    <use href="#xmark" x="688" y="185" width="24" height="24"/>
    
    <!-- Subsystem 4 - Pass -->
    <rect x="745" y="150" width="60" height="50" rx="6" fill="url(#passGrad)"/>
    <text x="775" y="180" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">S₄</text>
    <use href="#checkmark" x="763" y="185" width="24" height="24"/>
    
    <!-- Ellipsis -->
    <text x="825" y="180" font-family="Arial, sans-serif" font-size="20" fill="#666">…</text>
    
    <!-- Subsystem N - Pass -->
    <rect x="770" y="210" width="60" height="50" rx="6" fill="url(#passGrad)"/>
    <text x="800" y="240" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Sₙ</text>
    <use href="#checkmark" x="788" y="245" width="24" height="24"/>
  </g>
  
  <!-- Individual arrows down to aggregator -->
  <g stroke="#666" stroke-width="1.5" fill="none">
    <line x1="550" y1="200" x2="550" y2="280"/>
    <line x1="625" y1="200" x2="625" y2="280"/>
    <line x1="700" y1="200" x2="700" y2="280"/>
    <line x1="775" y1="200" x2="775" y2="280"/>
    <line x1="800" y1="260" x2="800" y2="280"/>
  </g>
  
  <!-- Converging lines to aggregator -->
  <g stroke="#666" stroke-width="1.5" fill="none">
    <line x1="550" y1="280" x2="675" y2="310"/>
    <line x1="625" y1="280" x2="675" y2="310"/>
    <line x1="700" y1="280" x2="675" y2="310"/>
    <line x1="775" y1="280" x2="675" y2="310"/>
    <line x1="800" y1="280" x2="675" y2="310"/>
  </g>
  <polygon points="675,320 670,310 680,310" fill="#666"/>
  
  <!-- k-of-N aggregator -->
  <g filter="url(#shadow)">
    <rect x="575" y="325" width="200" height="50" rx="8" fill="#1B5E20"/>
    <text x="675" y="350" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">k-of-N AGGREGATION</text>
    <text x="675" y="365" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#A5D6A7">(Accept if ≥k pass)</text>
  </g>
  
  <!-- Arrow to result -->
  <path d="M675 375 L675 405" stroke="#666" stroke-width="2" fill="none"/>
  <polygon points="675,415 670,405 680,405" fill="#666"/>
  
  <!-- ACCEPT result -->
  <g filter="url(#shadow)">
    <rect x="600" y="420" width="150" height="45" rx="8" fill="url(#passGrad)"/>
    <text x="675" y="448" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">ACCEPT</text>
  </g>
  
  <!-- Annotation: Resilience to local failures -->
  <g>
    <path d="M700 205 Q750 230 750 280" stroke="#4CAF50" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <text x="755" y="230" font-family="Arial, sans-serif" font-size="10" fill="#2E7D32" font-style="italic">Local failure</text>
    <text x="755" y="243" font-family="Arial, sans-serif" font-size="10" fill="#2E7D32" font-style="italic">tolerated</text>
  </g>
  
  <!-- Count indicator -->
  <g>
    <rect x="595" y="285" width="160" height="22" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
    <text x="675" y="300" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2E7D32">Passing: (N-1) ≥ k ✓</text>
  </g>
  
  <!-- Bottom legend -->
  <g transform="translate(450, 480)">
    <rect x="-180" y="-15" width="360" height="25" rx="5" fill="#F5F5F5" stroke="#E0E0E0"/>
    <rect x="-165" y="-5" width="12" height="12" rx="2" fill="url(#passGrad)"/>
    <text x="-148" y="5" font-family="Arial, sans-serif" font-size="10" fill="#333">Pass</text>
    <rect x="-105" y="-5" width="12" height="12" rx="2" fill="url(#failGrad)"/>
    <text x="-88" y="5" font-family="Arial, sans-serif" font-size="10" fill="#333">Fail</text>
    <rect x="-30" y="-5" width="12" height="12" rx="2" fill="#455A64"/>
    <text x="-13" y="5" font-family="Arial, sans-serif" font-size="10" fill="#333">Aggregator</text>
    <rect x="75" y="-5" width="12" height="12" rx="2" fill="none" stroke="#999" stroke-dasharray="3,1"/>
    <text x="92" y="5" font-family="Arial, sans-serif" font-size="10" fill="#333">Subsystem boundary</text>
  </g>
  
</svg>
